<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Project</title>
    <link rel="stylesheet" href="public/css/app.css">
    <script src="https://kit.fontawesome.com/a7999296b9.js" crossorigin="anonymous"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"

<body>
    <header class="container-header">
        <div class="box-one-header">
            <div class="box-one-1">
                <div class="box-one-1-1">
                    <i class="fa-solid fa-location-dot" style="color: rgb(116, 192, 252);"></i>
                    <p>Find a Store</p>
                </div>
                <div class="box-one-1-2">
                    <i class="fa-solid fa-headset" style="color: rgb(116, 192, 252);"></i>

                </div>
            </div>
            <div class="box-one-2">
                <p>Free delivery on orders over $75</p>
            </div>

        </div>
        <div class="box-two-header">
            <div class="box-two-1">
                <i class="fa-solid fa-cart-shopping" style="color: rgb(116, 192, 252);"></i>
                <p>ShopWise</p>
            </div>
            <div class="box-two-2">
                <i class="fa-solid fa-magnifying-glass" style="color: rgb(116, 192, 252);"></i>
                <input class="input-search" type="search">
                <button class="button-search" type="submit" >search</button>
            </div>
            <div class="box-two-3">
                <i class="fa-solid fa-circle-user" style="color: rgb(116, 192, 252);"></i>
                <i class="fa-solid fa-heart" style="color: rgb(116, 192, 252);"></i>
                <i class="fa-solid fa-bag-shopping" style="color: rgb(116, 192, 252);"></i>
            </div>

        </div>
        <div class="box-three-header">

        </div>
